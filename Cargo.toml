[package]
name = "rmonitor-tui"
version = "2.5.4"
edition = "2024"

[dependencies]
ratatui = "0.26"
crossterm = "0.27"
sysinfo = "0.30"
serde_json = "1.0.150"
rcommon = { git = "https://github.com/local76/rCommon.git", branch = "main", features = ["widgets", "sys-info", "window", "clipboard", "event-log"] }

[target.'cfg(windows)'.dependencies]
winreg = "0.56.0"

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"

[package.metadata.deb]
maintainer = "Jeryd <jerydleuck@gmail.com>"
assets = [
    ["target/x86_64-unknown-linux-musl/release/rmonitor-tui", "usr/bin/rmonitor-tui", "755"],
    ["assets/brand/app_icon.png", "usr/share/pixmaps/rmonitor-tui.png", "644"],
    ["packaging/desktop/rmonitor-tui.desktop", "usr/share/applications/rmonitor-tui.desktop", "644"],
]

[package.metadata.generate-rpm]
auto-req = "no"
assets = [
    { source = "target/x86_64-unknown-linux-musl/release/rmonitor-tui", dest = "/usr/bin/rmonitor-tui", mode = "755" },
    { source = "assets/brand/app_icon.png", dest = "/usr/share/pixmaps/rmonitor-tui.png", mode = "644" },
    { source = "packaging/desktop/rmonitor-tui.desktop", dest = "/usr/share/applications/rmonitor-tui.desktop", mode = "644" }
]

[patch."https://github.com/local76/rCommon.git"]
rcommon = { path = "../rCommon" }